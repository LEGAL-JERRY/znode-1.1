<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Node | Institution Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#0a2225',
                        'brand-light': '#113136',
                        accent: '#10B981',
                        'dark-bg': '#0f172a',
                        'dark-panel': '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
        
        /* Light/Dark Base */
        body.light { background: #F3F4F6; color: #1f2937; }
        body.dark { background: #0f172a; color: #f8fafc; }
        
        .glass-panel { backdrop-filter: blur(12px); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); transition: background-color 0.3s, border-color 0.3s; }
        .light .glass-panel { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); }

        .modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        
        .input-field { width: 100%; padding: 10px 14px; border-radius: 8px; font-size: 13px; outline: none; transition: all 0.2s; }
        .light .input-field { border: 1px solid #e5e7eb; background: #f9fafb; color: #1f2937; }
        .dark .input-field { border: 1px solid #334155; background: #0f172a; color: #f8fafc; }
        .input-field:focus { border-color: #10B981; }
        
        .btn-primary { background: #113136; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.2s; border: none; }
        .btn-primary:hover { background: #0a2225; }
        
        .btn-success { background: #10B981; color: white; padding: 8px 16px; border-radius: 6px; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; transition: transform 0.1s; border: none; }
        .btn-success:active { transform: scale(0.95); }

        .btn-danger { background: #EF4444; color: white; padding: 8px 16px; border-radius: 6px; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; transition: transform 0.1s; border: none; }
        .btn-danger:active { transform: scale(0.95); }

        /* Sidebar Tree CSS */
        details > summary { list-style: none; cursor: pointer; padding: 8px 12px; border-radius: 6px; transition: background 0.2s; font-size: 13px; font-weight: 600; color: #d1d5db; display: flex; align-items: center; justify-content: space-between; }
        details > summary::-webkit-details-marker { display: none; }
        details > summary:hover { background: rgba(255,255,255,0.05); color: #fff; }
        details[open] > summary { color: #fff; }
        details > summary::after { content: '›'; font-size: 16px; transition: transform 0.2s; }
        details[open] > summary::after { transform: rotate(90deg); }
        
        .tree-level { cursor: pointer; padding: 6px 12px 6px 30px; font-size: 12px; color: #9ca3af; border-radius: 6px; transition: all 0.2s; display: block; }
        .tree-level:hover, .tree-level.active { background: rgba(16, 185, 129, 0.15); color: #10B981; font-weight: 600; }

        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="light">

<div id="config-modal" class="modal-overlay hidden">
    <div class="glass-panel rounded-xl p-8 max-w-sm w-full mx-4">
        <h2 class="text-xl font-bold dark:text-white text-brand mb-2">System Config</h2>
        <p class="text-xs text-gray-500 mb-6">Connect Z-Node Admin to your database.</p>
        <div class="space-y-4 mb-6">
            <input id="cfg-url" type="url" class="input-field" placeholder="Supabase Project URL" />
            <input id="cfg-key" type="password" class="input-field" placeholder="Anon Public Key" />
        </div>
        <button onclick="saveConfig()" class="btn-primary w-full">Connect Backend</button>
    </div>
</div>

<div id="loading-overlay" class="modal-overlay hidden z-[2000]">
    <div class="text-center">
        <div class="spinner mb-3"></div>
        <p class="text-white text-sm font-medium" id="loading-text">Loading...</p>
    </div>
</div>

<div id="add-faculty-modal" class="modal-overlay hidden">
    <div class="glass-panel rounded-xl p-6 max-w-sm w-full mx-4 relative">
        <button onclick="hideEl('add-faculty-modal')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 dark:hover:text-white text-lg">✕</button>
        <h2 class="text-lg font-bold text-brand dark:text-white mb-1">Add New Faculty</h2>
        <p class="text-xs text-amber-500 mb-5 font-medium flex items-center gap-1">⚠️ Prototype Warning: NUC approvals bypass.</p>
        <div class="space-y-3 mb-5">
            <input id="new-faculty-name" type="text" class="input-field" placeholder="e.g. Faculty of Engineering">
        </div>
        <button onclick="createFaculty()" class="btn-primary w-full bg-amber-600 hover:bg-amber-700">Force Add Faculty</button>
    </div>
</div>

<div id="screen-login" class="min-h-screen flex items-center justify-center p-4 hidden bg-gradient-to-br from-gray-100 to-gray-200 dark:from-slate-900 dark:to-slate-800">
    <div class="glass-panel rounded-2xl p-8 max-w-sm w-full shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-brand text-white rounded-xl flex items-center justify-center font-black text-2xl mx-auto mb-4">Z</div>
            <h1 class="text-xl font-black text-brand dark:text-white">Admin Portal</h1>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 tracking-wider">Username</label>
                <input id="login-username" type="text" class="input-field" placeholder="e.g. admin_fulafia">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1 tracking-wider">Password</label>
                <input id="login-password" type="password" class="input-field" placeholder="••••••••">
            </div>
            <p id="login-error" class="text-red-500 text-xs hidden font-medium text-center"></p>
            <button onclick="handleLogin()" class="btn-primary w-full mt-2">Secure Login</button>
        </div>
    </div>
</div>

<div id="screen-dashboard" class="hidden h-screen flex flex-col">
    
    <header class="bg-white dark:bg-dark-panel border-b border-gray-200 dark:border-gray-800 h-16 flex-shrink-0 flex items-center justify-between px-6 z-10 shadow-sm transition-colors">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-brand rounded flex items-center justify-center text-white font-black">Z</div>
            <div>
                <h1 id="nav-inst-name" class="font-bold text-brand dark:text-white text-sm">University Name</h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Administrative Console</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="text-gray-500 hover:text-brand dark:text-gray-400 dark:hover:text-white p-2 rounded-lg bg-gray-100 dark:bg-slate-800 transition">
                <span id="theme-icon">🌙</span>
            </button>
            <div class="h-6 w-px bg-gray-200 dark:bg-gray-700"></div>
            <div class="text-right hidden md:block">
                <p id="nav-admin-name" class="text-xs font-bold text-gray-800 dark:text-gray-200">Admin Name</p>
                <button onclick="logout()" class="text-[10px] text-red-500 font-bold uppercase hover:underline">Sign Out</button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-brand flex-shrink-0 flex flex-col h-full overflow-y-auto">
            <div class="p-5 flex-1">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Directory View</p>
                    <button onclick="showEl('add-faculty-modal')" class="text-[10px] bg-white/10 hover:bg-white/20 text-white px-2 py-1 rounded transition">+ Add</button>
                </div>
                <div id="sidebar-tree" class="space-y-1">
                    </div>
            </div>
            
            <div class="mt-auto p-5 border-t border-white/10">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3">System</p>
                <button class="w-full text-left text-xs font-medium text-gray-300 hover:text-white py-2 flex items-center gap-2">
                    <span>⚙️</span> Portal Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 bg-gray-50 dark:bg-dark-bg overflow-y-auto p-8 transition-colors">
            
            <div class="flex items-end justify-between mb-6">
                <div>
                    <h2 id="view-title" class="text-2xl font-black text-brand dark:text-white">Dashboard Overview</h2>
                    <p id="view-subtitle" class="text-xs text-gray-500 mt-1">Select a level from the sidebar to view students.</p>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="bg-white dark:bg-dark-panel border border-gray-200 dark:border-gray-700 rounded-lg p-1 flex gap-1 shadow-sm">
                        <button onclick="setViewMode('grid')" id="btn-view-grid" class="p-1.5 rounded bg-gray-100 dark:bg-slate-700 text-gray-800 dark:text-white transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        </button>
                        <button onclick="setViewMode('list')" id="btn-view-list" class="p-1.5 rounded text-gray-400 hover:text-gray-800 dark:hover:text-white transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        </button>
                    </div>
                    <button onclick="fetchAndRenderData()" class="text-xs font-bold text-gray-500 dark:text-gray-300 hover:text-brand bg-white dark:bg-dark-panel border border-gray-200 dark:border-gray-700 px-3 py-1.5 rounded-lg shadow-sm">↻ Sync</button>
                </div>
            </div>

            <div id="overview-stats" class="grid grid-cols-3 gap-5 mb-8">
                </div>

            <div id="student-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                </div>

        </main>
    </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// 1. STATE & UTILS
// ════════════════════════════════════════════════════════
let _db = null;
let currentAdmin = null;
let currentInstitution = null;
let allStudents = [];
let currentDisplayStudents = [];
let manualFaculties = []; // Prototype array for faculties created on the fly
let viewMode = 'grid'; // 'grid' or 'list'

const showEl = (id) => document.getElementById(id).classList.remove('hidden');
const hideEl = (id) => document.getElementById(id).classList.add('hidden');
function showLoader(text) { showEl('loading-overlay'); document.getElementById('loading-text').textContent = text; }
function hideLoader() { hideEl('loading-overlay'); }

// Formatting Currency for Nigerian Naira
const formatNaira = (amount) => new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN', minimumFractionDigits: 0 }).format(amount || 0);

async function hashPassword(password) {
    const data = new TextEncoder().encode(password + 'znode_salt_2026');
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// Theme Logic
function toggleTheme() {
    const html = document.documentElement;
    const icon = document.getElementById('theme-icon');
    if (html.classList.contains('dark')) {
        html.classList.remove('dark'); html.classList.add('light'); icon.textContent = '🌙';
    } else {
        html.classList.remove('light'); html.classList.add('dark'); icon.textContent = '☀️';
    }
}

// ════════════════════════════════════════════════════════
// 2. BOOT & AUTHENTICATION
// ════════════════════════════════════════════════════════
function saveConfig() {
    const url = document.getElementById('cfg-url').value.trim();
    const key = document.getElementById('cfg-key').value.trim();
    if (!url || !key) return alert('Inputs required.');
    localStorage.setItem('znodeAdminUrl', url);
    localStorage.setItem('znodeAdminKey', key);
    initApp(url, key);
}

function initApp(url, key) {
    try { _db = window.supabase.createClient(url, key); hideEl('config-modal'); checkSession(); } 
    catch (e) { alert('Connection Failed.'); localStorage.clear(); }
}

async function checkSession() {
    const saved = localStorage.getItem('znodeAdminSession');
    if (saved) {
        currentAdmin = JSON.parse(saved);
        await loadInstitutionData();
        bootDashboard();
    } else showEl('screen-login');
}

async function loadInstitutionData() {
    const { data } = await _db.from('institutions').select('*').eq('id', currentAdmin.institution_id).single();
    currentInstitution = data;
}

async function handleLogin() {
    const user = document.getElementById('login-username').value.trim();
    const pass = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    if(!user || !pass) { err.textContent = "Enter credentials."; showEl('login-error'); return; }

    hideEl('login-error'); showLoader("Authenticating...");
    const hash = await hashPassword(pass);
    const { data: admin, error } = await _db.from('institution_admins').select('*').eq('username', user).eq('password_hash', hash).single();
    hideLoader();

    if (error || !admin) { err.textContent = "Invalid credentials."; showEl('login-error'); return; }
    currentAdmin = admin;
    localStorage.setItem('znodeAdminSession', JSON.stringify(admin));
    await loadInstitutionData();
    hideEl('screen-login'); bootDashboard();
}

function logout() { localStorage.removeItem('znodeAdminSession'); location.reload(); }

// ════════════════════════════════════════════════════════
// 3. DASHBOARD & SIDEBAR DATA ENGINE
// ════════════════════════════════════════════════════════
function bootDashboard() {
    showEl('screen-dashboard');
    document.getElementById('nav-admin-name').textContent = currentAdmin.full_name;
    document.getElementById('nav-inst-name').textContent = currentInstitution?.name || "Institution Portal";
    fetchAndRenderData();
}

async function fetchAndRenderData() {
    showLoader("Syncing Registry...");
    const { data, error } = await _db.from('students').select('*').eq('institution_id', currentAdmin.institution_id).order('created_at', { ascending: false });
    hideLoader();
    if (error) return alert('Sync error: ' + error.message);
    
    allStudents = data || [];
    // Mocking Fee Data if not present in schema
    allStudents = allStudents.map(s => ({
        ...s,
        fee_status: s.fee_status || (Math.random() > 0.5 ? 'PAID' : (Math.random() > 0.5 ? 'PARTIAL' : 'UNPAID')),
        fee_paid: s.fee_paid || (Math.floor(Math.random() * 150000)),
        fee_total: s.fee_total || 150000
    }));

    updateStats();
    buildSidebarTree();
    showOverview(); // Default to overview
}

function updateStats() {
    const verified = allStudents.filter(s => s.verification_status === 'VERIFIED').length;
    const rejected = allStudents.filter(s => s.verification_status === 'REJECTED').length;
    const pending = allStudents.length - verified - rejected;
    
    document.getElementById('overview-stats').innerHTML = `
        <div class="bg-white dark:bg-dark-panel p-5 rounded-xl border border-gray-100 dark:border-gray-800 shadow-sm transition-colors">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-1">Total Enrolled</p>
            <p class="text-3xl font-black text-brand dark:text-white">${allStudents.length}</p>
        </div>
        <div class="bg-white dark:bg-dark-panel p-5 rounded-xl border border-gray-100 dark:border-gray-800 shadow-sm transition-colors">
            <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-wider mb-1">Verified Passports</p>
            <p class="text-3xl font-black text-emerald-600 dark:text-emerald-400">${verified}</p>
        </div>
        <div class="bg-white dark:bg-dark-panel p-5 rounded-xl border border-gray-100 dark:border-gray-800 shadow-sm transition-colors">
            <p class="text-[10px] text-amber-500 font-bold uppercase tracking-wider mb-1">Pending Review</p>
            <p class="text-3xl font-black text-amber-600 dark:text-amber-400">${pending}</p>
        </div>
    `;
}

function buildSidebarTree() {
    const tree = {};
    // Seed with existing students
    allStudents.forEach(s => {
        const fac = s.faculty || 'Unassigned Faculty';
        const dep = s.department || 'Unassigned Department';
        const lvl = s.academic_level || 'Lvl 100';
        if (!tree[fac]) tree[fac] = {};
        if (!tree[fac][dep]) tree[fac][dep] = {};
        if (!tree[fac][dep][lvl]) tree[fac][dep][lvl] = [];
        tree[fac][dep][lvl].push(s);
    });

    // Add manually created prototype faculties
    manualFaculties.forEach(fac => {
        if (!tree[fac]) tree[fac] = { 'Setup Required': { '0': [] } };
    });

    let html = `<div onclick="showOverview()" class="tree-level active mb-4 font-bold" style="padding-left:12px;">🏠 Global Overview</div>`;
    
    Object.keys(tree).sort().forEach(fac => {
        html += `<details class="mb-1"><summary>🏛️ ${fac}</summary><div class="pl-3 border-l border-white/10 ml-4 mt-1 space-y-1">`;
        Object.keys(tree[fac]).sort().forEach(dep => {
            html += `<details><summary class="text-xs text-gray-400">📚 ${dep}</summary><div class="pl-3 border-l border-white/10 ml-4 mt-1 mb-2 space-y-1">`;
            Object.keys(tree[fac][dep]).sort().forEach(lvl => {
                const count = tree[fac][dep][lvl].length;
                html += `<div onclick="loadGridData('${fac}', '${dep}', '${lvl}')" class="tree-level flex justify-between">
                            <span>Level ${lvl}</span> <span class="bg-brand-light px-1.5 rounded text-[10px]">${count}</span>
                         </div>`;
            });
            html += `</div></details>`;
        });
        html += `</div></details>`;
    });
    document.getElementById('sidebar-tree').innerHTML = html;
}

// Prototype Function: Create Faculty Manually
function createFaculty() {
    const name = document.getElementById('new-faculty-name').value.trim();
    if (!name) return alert("Enter faculty name.");
    if (manualFaculties.includes(name)) return alert("Faculty already exists.");
    
    manualFaculties.push(name);
    buildSidebarTree();
    hideEl('add-faculty-modal');
    document.getElementById('new-faculty-name').value = '';
}

// ════════════════════════════════════════════════════════
// 4. DISPLAY ENGINE (GRID/LIST) & ACTIONS
// ════════════════════════════════════════════════════════
function setViewMode(mode) {
    viewMode = mode;
    const btnGrid = document.getElementById('btn-view-grid');
    const btnList = document.getElementById('btn-view-list');
    
    if (mode === 'grid') {
        btnGrid.className = 'p-1.5 rounded bg-gray-100 dark:bg-slate-700 text-gray-800 dark:text-white transition';
        btnList.className = 'p-1.5 rounded text-gray-400 hover:text-gray-800 dark:hover:text-white transition';
        document.getElementById('student-container').className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5';
    } else {
        btnList.className = 'p-1.5 rounded bg-gray-100 dark:bg-slate-700 text-gray-800 dark:text-white transition';
        btnGrid.className = 'p-1.5 rounded text-gray-400 hover:text-gray-800 dark:hover:text-white transition';
        document.getElementById('student-container').className = 'flex flex-col gap-3';
    }
    renderStudents(currentDisplayStudents);
}

function showOverview() {
    document.getElementById('view-title').textContent = "Dashboard Overview";
    document.getElementById('view-subtitle').textContent = "Select a level from the sidebar to view students.";
    showEl('overview-stats');
    currentDisplayStudents = [];
    document.getElementById('student-container').innerHTML = '';
    document.querySelectorAll('.tree-level').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

function loadGridData(faculty, department, level) {
    hideEl('overview-stats');
    document.getElementById('view-title').textContent = `${department} (${level})`;
    document.getElementById('view-subtitle').textContent = `${faculty}`;
    
    document.querySelectorAll('.tree-level').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');

    currentDisplayStudents = allStudents.filter(s => 
        (s.faculty || 'Unassigned Faculty') === faculty && 
        (s.department || 'Unassigned Department') === department && 
        (s.academic_level || 'Lvl 100') === level
    );
    renderStudents(currentDisplayStudents);
}

function renderStudents(students) {
    const container = document.getElementById('student-container');
    let html = '';
    
    if (students.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400 text-sm">No students found in this block.</div>`;
        return;
    }

    students.forEach(st => {
        const isVer = st.verification_status === 'VERIFIED';
        const isRej = st.verification_status === 'REJECTED';
        const passport = st.znode_passport_id || 'Pending Issuance';
        
        // Fee Badge Logic
        let feeColor = st.fee_status === 'PAID' ? 'text-emerald-600 bg-emerald-100' : 
                       st.fee_status === 'PARTIAL' ? 'text-amber-600 bg-amber-100' : 'text-red-600 bg-red-100';
        
        if (viewMode === 'grid') {
            html += `
            <div class="bg-white dark:bg-dark-panel rounded-xl border border-gray-200 dark:border-gray-800 p-5 shadow-sm hover:shadow-md transition-all">
                <div class="flex items-start justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-brand flex items-center justify-center text-white font-black uppercase flex-shrink-0">${st.full_name.charAt(0)}</div>
                        <div class="overflow-hidden">
                            <p class="font-bold text-gray-800 dark:text-white text-sm leading-tight truncate">${st.full_name}</p>
                            <p class="text-[10px] text-gray-500 font-mono">${st.matric_number}</p>
                        </div>
                    </div>
                    ${isVer ? '<span class="bg-emerald-100/50 text-emerald-600 dark:text-emerald-400 text-[9px] font-bold px-2 py-1 rounded border border-emerald-200 dark:border-emerald-800">VERIFIED</span>' : 
                      isRej ? '<span class="bg-red-100/50 text-red-600 dark:text-red-400 text-[9px] font-bold px-2 py-1 rounded border border-red-200 dark:border-red-800">REJECTED</span>' : 
                      '<span class="bg-amber-100/50 text-amber-600 dark:text-amber-400 text-[9px] font-bold px-2 py-1 rounded border border-amber-200 dark:border-amber-800">PENDING</span>'}
                </div>
                
                <div class="bg-gray-50 dark:bg-slate-800/50 p-3 rounded-lg mb-4 border border-gray-100 dark:border-gray-700 flex justify-between items-center">
                    <div>
                        <p class="text-[9px] text-gray-400 uppercase font-bold mb-0.5">Z-Node Passport</p>
                        <p class="text-xs font-mono font-bold ${isVer ? 'text-brand dark:text-emerald-400' : 'text-gray-400'}">${passport}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-gray-400 uppercase font-bold mb-0.5">Fee Status</p>
                        <span class="${feeColor} text-[9px] font-bold px-1.5 py-0.5 rounded">${st.fee_status}</span>
                        <p class="text-[10px] font-bold dark:text-gray-300 mt-1">${formatNaira(st.fee_paid)}</p>
                    </div>
                </div>

                ${(!isVer && !isRej) ? `
                    <div class="flex gap-2">
                        <button onclick="updateStudentStatus(${st.id}, '${st.matric_number}', 'VERIFIED')" class="btn-success flex-1">Issue Passport</button>
                        <button onclick="updateStudentStatus(${st.id}, '${st.matric_number}', 'REJECTED')" class="btn-danger">Reject</button>
                    </div>
                ` : isVer ? `<div class="text-center text-[10px] font-bold text-gray-400 py-2">✓ Passport Active</div>` 
                          : `<div class="text-center text-[10px] font-bold text-red-400 py-2">✕ Application Rejected</div>`}
            </div>`;
        } else {
            // List View
            html += `
            <div class="bg-white dark:bg-dark-panel rounded-xl border border-gray-200 dark:border-gray-800 p-4 shadow-sm flex items-center gap-4 transition-all hover:bg-gray-50 dark:hover:bg-slate-800">
                <div class="w-10 h-10 rounded-full bg-brand flex items-center justify-center text-white font-black uppercase flex-shrink-0">${st.full_name.charAt(0)}</div>
                
                <div class="flex-1 min-w-0">
                    <p class="font-bold text-gray-800 dark:text-white text-sm leading-tight truncate">${st.full_name}</p>
                    <p class="text-[10px] text-gray-500 font-mono">${st.matric_number} • <span class="${st.fee_status === 'PAID'?'text-emerald-500':'text-amber-500'} font-bold">${formatNaira(st.fee_paid)} ${st.fee_status}</span></p>
                </div>
                
                <div class="hidden md:block flex-1">
                    <p class="text-xs font-mono font-bold ${isVer ? 'text-brand dark:text-emerald-400' : 'text-gray-400'}">${passport}</p>
                </div>

                <div class="flex items-center gap-2">
                    ${(!isVer && !isRej) ? `
                        <button onclick="updateStudentStatus(${st.id}, '${st.matric_number}', 'VERIFIED')" class="btn-success">Verify</button>
                        <button onclick="updateStudentStatus(${st.id}, '${st.matric_number}', 'REJECTED')" class="btn-danger">Reject</button>
                    ` : isVer ? `<span class="text-[10px] font-bold text-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 px-3 py-1.5 rounded border border-emerald-100 dark:border-emerald-800">VERIFIED</span>`
                              : `<span class="text-[10px] font-bold text-red-500 bg-red-50 dark:bg-red-900/30 px-3 py-1.5 rounded border border-red-100 dark:border-red-800">REJECTED</span>`}
                </div>
            </div>`;
        }
    });
    
    container.innerHTML = html;
}

async function updateStudentStatus(studentId, matricNumber, status) {
    const actionText = status === 'VERIFIED' ? 'Verify and issue passport?' : 'Reject this student application due to incorrect information?';
    if (!confirm(actionText)) return;
    
    showLoader(status === 'VERIFIED' ? 'Issuing Passport...' : 'Rejecting Application...');
    
    let updatePayload = { verification_status: status };
    
    if (status === 'VERIFIED') {
        const prefix = currentInstitution?.passport_prefix || 'UNV';
        const suffix = matricNumber.replace(/[^a-zA-Z0-9]/g, '').slice(-6).toUpperCase();
        updatePayload.znode_passport_id = `ZNP-${prefix}-2026-${suffix}`;
    }

    const { error } = await _db.from('students').update(updatePayload).eq('id', studentId);
    hideLoader();
    
    if (error) return alert('Database Error: ' + error.message);
    
    // Refresh Data seamlessly
    const activeLevelText = document.getElementById('view-title').textContent; 
    await fetchAndRenderData();
    
    // Re-click the sidebar to stay on the same page
    const treeLinks = document.querySelectorAll('.tree-level');
    treeLinks.forEach(link => { if(link.textContent.includes(activeLevelText.split(' ')[1].replace(/[()]/g, ''))) link.click(); });
}

    if (url && key) { document.getElementById('cfg-url').value = url; document.getElementById('cfg-key').value = key; initApp(url, key); } 
    else showEl('config-modal');
})();
</script>
